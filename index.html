<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Happy Birthday Celebration</title>
  <style>
    :root {
      --bg1: #140106;
      --bg2: #25030d;
      --bg3: #420615;
      --gold: #ffb3a5;
      --pink: #ff2e63;
      --cyan: #ff7b93;
      --white: #fff1f4;
      --glass: rgba(255, 210, 220, 0.09);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: "Poppins", "Segoe UI", sans-serif;
      color: var(--white);
      background: radial-gradient(circle at 20% 20%, #4a0f1d 0%, transparent 35%),
                  radial-gradient(circle at 80% 70%, #7b1028 0%, transparent 40%),
                  linear-gradient(135deg, var(--bg1), var(--bg2), var(--bg3));
      background-size: 150% 150%;
      animation: cosmicShift 14s ease-in-out infinite alternate;
    }

    @keyframes cosmicShift {
      0% { background-position: 0% 0%, 100% 100%, 0% 50%; }
      100% { background-position: 50% 30%, 60% 70%, 100% 50%; }
    }

    .stars, .bubbles, .confetti, .balloons {
      position: absolute;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
    }

    .star {
      position: absolute;
      width: 2px;
      height: 2px;
      border-radius: 50%;
      background: #fff;
      box-shadow: 0 0 6px #fff;
      animation: twinkle var(--dur) linear infinite;
      opacity: 0.5;
    }

    @keyframes twinkle {
      0%, 100% { transform: scale(0.5); opacity: 0.2; }
      50% { transform: scale(1.8); opacity: 1; }
    }

    .bubble {
      position: absolute;
      bottom: -80px;
      border-radius: 50%;
      border: 1px solid rgba(255, 255, 255, 0.35);
      background: rgba(255, 255, 255, 0.05);
      box-shadow: inset 0 0 20px rgba(255, 255, 255, 0.1), 0 0 16px rgba(255, 70, 110, 0.25);
      animation: rise linear infinite;
    }

    @keyframes rise {
      0% { transform: translateY(0) translateX(0) scale(0.8); opacity: 0; }
      10% { opacity: 0.8; }
      90% { opacity: 0.7; }
      100% { transform: translateY(-115vh) translateX(var(--drift)) scale(1.2); opacity: 0; }
    }

    .card {
      position: absolute;
      top: 50%;
      left: 50%;
      width: min(92vw, 920px);
      transform: translate(-50%, -50%);
      border-radius: 28px;
      padding: clamp(16px, 3vw, 36px);
      background: linear-gradient(135deg, rgba(255,255,255,0.14), rgba(255,255,255,0.06));
      border: 1px solid rgba(255, 255, 255, 0.25);
      box-shadow: 0 20px 60px rgba(0,0,0,0.35), inset 0 0 0 1px rgba(255,255,255,0.08);
      backdrop-filter: blur(10px);
      overflow: hidden;
      animation: cardFloat 4s ease-in-out infinite;
    }

    @keyframes cardFloat {
      0%, 100% { transform: translate(-50%, -50%) translateY(-6px); }
      50% { transform: translate(-50%, -50%) translateY(6px); }
    }

    .glow-ring {
      position: absolute;
      width: 560px;
      height: 560px;
      border-radius: 50%;
      border: 2px dashed rgba(255, 255, 255, 0.35);
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      filter: drop-shadow(0 0 22px rgba(255, 76, 116, 0.5));
      animation: spin 26s linear infinite;
      pointer-events: none;
    }

    .glow-ring::before,
    .glow-ring::after {
      content: "";
      position: absolute;
      inset: 25px;
      border: 2px dotted rgba(255, 123, 147, 0.5);
      border-radius: 50%;
      animation: spin 18s linear infinite reverse;
    }

    .glow-ring::after {
      inset: 60px;
      border-color: rgba(255, 179, 165, 0.45);
      animation-duration: 12s;
    }

    @keyframes spin {
      from { transform: translate(-50%, -50%) rotate(0deg); }
      to { transform: translate(-50%, -50%) rotate(360deg); }
    }

    .title-wrap {
      text-align: center;
      z-index: 5;
      position: relative;
      margin-top: 34px;
    }

    .spark {
      display: inline-block;
      font-size: clamp(2.2rem, 7vw, 4.8rem);
      margin: 0 2px;
      animation: pop 1.6s ease-in-out infinite;
      filter: drop-shadow(0 0 12px rgba(255, 255, 255, 0.8));
    }

    .spark:nth-child(2) { animation-delay: 0.2s; }
    .spark:nth-child(3) { animation-delay: 0.4s; }
    .spark:nth-child(4) { animation-delay: 0.6s; }
    .spark:nth-child(5) { animation-delay: 0.8s; }

    @keyframes pop {
      0%, 100% { transform: translateY(0) rotate(0); }
      50% { transform: translateY(-12px) rotate(12deg); }
    }

    .main-title {
      margin-top: 8px;
      font-size: clamp(2.1rem, 8vw, 5.2rem);
      font-weight: 900;
      line-height: 1.05;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #fff4f7;
      -webkit-text-stroke: 1px rgba(130, 7, 36, 0.7);
      text-shadow:
        0 2px 0 rgba(87, 3, 23, 0.95),
        0 0 12px rgba(255, 146, 173, 0.7),
        0 0 30px rgba(255, 62, 104, 0.45);
      animation: titleGlow 2.8s ease-in-out infinite;
    }

    @keyframes titleGlow {
      0%, 100% {
        text-shadow:
          0 2px 0 rgba(87, 3, 23, 0.95),
          0 0 10px rgba(255, 146, 173, 0.65),
          0 0 26px rgba(255, 62, 104, 0.4);
      }
      50% {
        text-shadow:
          0 2px 0 rgba(87, 3, 23, 0.95),
          0 0 16px rgba(255, 175, 196, 0.95),
          0 0 36px rgba(255, 62, 104, 0.65);
      }
    }

    .subtitle {
      margin: 14px auto 0;
      width: min(100%, 760px);
      font-size: clamp(0.95rem, 2.4vw, 1.25rem);
      opacity: 0.9;
      line-height: 1.55;
      text-wrap: balance;
      animation: fadePulse 2.8s ease-in-out infinite;
    }

    @keyframes fadePulse {
      0%, 100% { opacity: 0.65; }
      50% { opacity: 1; }
    }

    .romantic-core {
      margin: 26px auto 0;
      width: 230px;
      height: 230px;
      position: relative;
      z-index: 8;
      animation: coreFloat 3.4s ease-in-out infinite;
    }

    @keyframes coreFloat {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }

    .heart {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 94px;
      height: 86px;
      transform: translate(-50%, -50%) rotate(-45deg);
      background: linear-gradient(145deg, #ff4b6e, #b20e34);
      box-shadow: 0 0 35px rgba(255, 62, 104, 0.65);
      animation: beat 1s ease-in-out infinite;
    }

    .heart::before,
    .heart::after {
      content: "";
      position: absolute;
      width: 94px;
      height: 86px;
      border-radius: 50%;
      background: inherit;
    }

    .heart::before { top: -44px; left: 0; }
    .heart::after { left: 44px; top: 0; }

    @keyframes beat {
      0%, 100% { transform: translate(-50%, -50%) rotate(-45deg) scale(1); }
      25% { transform: translate(-50%, -50%) rotate(-45deg) scale(1.08); }
      45% { transform: translate(-50%, -50%) rotate(-45deg) scale(0.96); }
      65% { transform: translate(-50%, -50%) rotate(-45deg) scale(1.12); }
    }

    .orbit {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      border: 1px dashed rgba(255, 170, 188, 0.5);
      animation: spinOrbit 10s linear infinite;
    }

    .orbit::before,
    .orbit::after {
      content: "❤";
      position: absolute;
      font-size: 1.25rem;
      color: #ff8ba4;
      text-shadow: 0 0 12px rgba(255, 139, 164, 0.9);
    }

    .orbit::before { left: 50%; top: -10px; transform: translateX(-50%); }
    .orbit::after { left: 50%; bottom: -10px; transform: translateX(-50%); }

    .orbit.two {
      inset: 18px;
      border-color: rgba(255, 114, 145, 0.48);
      animation-duration: 7s;
      animation-direction: reverse;
    }

    @keyframes spinOrbit {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    .confetti-piece {
      position: absolute;
      width: 10px;
      height: 16px;
      opacity: 0.95;
      animation: confettiFall linear forwards;
    }

    @keyframes confettiFall {
      from {
        transform: translateY(-12vh) translateX(0) rotate(0deg);
        opacity: 0;
      }
      10% {
        opacity: 1;
      }
      to {
        transform: translateY(110vh) translateX(var(--xdrift)) rotate(720deg);
        opacity: 1;
      }
    }

    .balloon {
      position: absolute;
      bottom: -180px;
      width: 64px;
      height: 78px;
      border-radius: 50% 50% 46% 46%;
      background: var(--c);
      box-shadow: inset -8px -10px 16px rgba(0,0,0,0.12), 0 10px 18px rgba(0,0,0,0.2);
      animation: balloonFly linear infinite;
    }

    .balloon::before {
      content: "";
      position: absolute;
      width: 8px;
      height: 8px;
      background: rgba(255,255,255,0.7);
      border-radius: 50%;
      top: 14px;
      left: 14px;
    }

    .balloon::after {
      content: "";
      position: absolute;
      width: 2px;
      height: 76px;
      background: rgba(255,255,255,0.45);
      left: 50%;
      transform: translateX(-50%);
      top: 74px;
    }

    @keyframes balloonFly {
      0% { transform: translateY(0) translateX(0) rotate(0deg); opacity: 0; }
      10% { opacity: 1; }
      100% { transform: translateY(-130vh) translateX(var(--moveX)) rotate(var(--rot)); opacity: 0; }
    }

    .music-visual {
      position: absolute;
      left: 50%;
      bottom: 12px;
      transform: translateX(-50%);
      display: flex;
      gap: 6px;
      z-index: 10;
      opacity: 0.65;
    }

    .bar {
      width: 6px;
      height: 24px;
      border-radius: 999px;
      background: linear-gradient(180deg, #ff9db2, #ff2e63);
      animation: equalizer 1s ease-in-out infinite;
    }

    .bar:nth-child(2) { animation-delay: 0.1s; }
    .bar:nth-child(3) { animation-delay: 0.2s; }
    .bar:nth-child(4) { animation-delay: 0.3s; }
    .bar:nth-child(5) { animation-delay: 0.4s; }
    .bar:nth-child(6) { animation-delay: 0.5s; }

    @keyframes equalizer {
      0%, 100% { transform: scaleY(0.45); }
      50% { transform: scaleY(1.3); }
    }

    .footer-note {
      margin-top: 18px;
      text-align: center;
      font-size: 0.88rem;
      opacity: 0.75;
      letter-spacing: 0.2px;
    }

    @media (max-width: 650px) {
      .glow-ring {
        width: 380px;
        height: 380px;
      }

      .card {
        padding-bottom: 18px;
      }
    }
  </style>
</head>
<body>
  <div class="stars" id="stars"></div>
  <div class="bubbles" id="bubbles"></div>
  <div class="balloons" id="balloons"></div>
  <div class="confetti" id="confetti"></div>

  <div class="glow-ring"></div>

  <main class="card">
    <section class="title-wrap">
      <div>
        <span class="spark">❤</span>
        <span class="spark">🌹</span>
        <span class="spark">❤</span>
        <span class="spark">✨</span>
        <span class="spark">🌙</span>
      </div>
      <h1 class="main-title" id="mainTitle">Happy Birthday, Miki!</h1>

    </section>

    <section class="romantic-core">
      <div class="orbit"></div>
      <div class="orbit two"></div>
      <div class="heart"></div>
    </section>

    <p class="footer-note">Tap anywhere to shower hearts and start the music.</p>
    <div class="music-visual" aria-hidden="true">
      <div class="bar"></div><div class="bar"></div><div class="bar"></div>
      <div class="bar"></div><div class="bar"></div><div class="bar"></div>
    </div>
  </main>

  <audio id="birthdaySong" loop preload="auto">
    <source src="mekky.mp3" type="audio/mpeg" />
  </audio>

  <script>
    const starsEl = document.getElementById("stars");
    const bubblesEl = document.getElementById("bubbles");
    const confettiEl = document.getElementById("confetti");
    const balloonsEl = document.getElementById("balloons");
    const titleEl = document.getElementById("mainTitle");
    const subtitleEl = document.getElementById("subtitle");
    const birthdaySong = document.getElementById("birthdaySong");
    let songStarted = false;

    function random(min, max) {
      return Math.random() * (max - min) + min;
    }

    function createStars(count = 140) {
      for (let i = 0; i < count; i++) {
        const star = document.createElement("span");
        star.className = "star";
        star.style.left = `${random(0, 100)}%`;
        star.style.top = `${random(0, 100)}%`;
        star.style.setProperty("--dur", `${random(1.8, 4.4)}s`);
        starsEl.appendChild(star);
      }
    }

    function createBubbles(count = 35) {
      for (let i = 0; i < count; i++) {
        const b = document.createElement("span");
        b.className = "bubble";
        const size = random(16, 70);
        b.style.width = `${size}px`;
        b.style.height = `${size}px`;
        b.style.left = `${random(0, 100)}%`;
        b.style.animationDuration = `${random(8, 18)}s`;
        b.style.animationDelay = `${random(-15, 0)}s`;
        b.style.setProperty("--drift", `${random(-120, 120)}px`);
        bubblesEl.appendChild(b);
      }
    }

    function createBalloons(count = 22) {
      const colors = ["#ff6b8a", "#ff3d6e", "#d11443", "#ff97ad", "#b90f38", "#ff7f96"];
      for (let i = 0; i < count; i++) {
        const bl = document.createElement("span");
        bl.className = "balloon";
        bl.style.left = `${random(0, 100)}%`;
        bl.style.setProperty("--c", colors[Math.floor(random(0, colors.length))]);
        bl.style.animationDuration = `${random(10, 18)}s`;
        bl.style.animationDelay = `${random(-12, 2)}s`;
        bl.style.setProperty("--moveX", `${random(-100, 100)}px`);
        bl.style.setProperty("--rot", `${random(-12, 12)}deg`);
        balloonsEl.appendChild(bl);
      }
    }

    function confettiBurst(x = window.innerWidth / 2, y = window.innerHeight / 3, amount = 120) {
      const colors = ["#ff2e63", "#ff5f84", "#ff9bb4", "#ffd4df", "#c20d3e", "#ffffff"];
      for (let i = 0; i < amount; i++) {
        const piece = document.createElement("span");
        piece.className = "confetti-piece";
        const sizeW = random(5, 12);
        const sizeH = random(9, 20);
        piece.style.width = `${sizeW}px`;
        piece.style.height = `${sizeH}px`;
        piece.style.left = `${x + random(-40, 40)}px`;
        piece.style.top = `${y + random(-20, 20)}px`;
        piece.style.background = colors[Math.floor(random(0, colors.length))];
        piece.style.borderRadius = Math.random() > 0.6 ? "50%" : `${random(0, 4)}px`;
        piece.style.animationDuration = `${random(2.8, 5.4)}s`;
        piece.style.setProperty("--xdrift", `${random(-280, 280)}px`);
        confettiEl.appendChild(piece);
        setTimeout(() => piece.remove(), 5600);
      }
    }

    function waveTitle() {
      const letters = titleEl.textContent.split("");
      titleEl.textContent = "";
      letters.forEach((ch, i) => {
        const span = document.createElement("span");
        span.textContent = ch;
        span.style.display = "inline-block";
        span.style.animation = `pop 1.8s ease-in-out ${i * 0.08}s infinite`;
        titleEl.appendChild(span);
      });
    }

    function init() {
      createStars();
      createBubbles();
      createBalloons();
      waveTitle();
      confettiBurst(window.innerWidth / 2, window.innerHeight / 2.8, 220);
      subtitleEl.animate(
        [
          { transform: "translateY(6px)", opacity: 0.4 },
          { transform: "translateY(0)", opacity: 1 }
        ],
        { duration: 1400, easing: "ease-out", fill: "forwards" }
      );
    }

    document.addEventListener("click", (e) => {
      confettiBurst(e.clientX, e.clientY, 85);
      if (!songStarted) {
        birthdaySong.volume = 0.55;
        birthdaySong.play().then(() => {
          songStarted = true;
        }).catch(() => {
          // Browser may block autoplay until a trusted user action.
        });
      }
    });

    window.addEventListener("resize", () => {
      if (window.innerWidth < 450) {
        document.querySelectorAll(".balloon").forEach((el, idx) => {
          if (idx % 2 === 0) {
            el.style.display = "none";
          }
        });
      } else {
        document.querySelectorAll(".balloon").forEach((el) => {
          el.style.display = "block";
        });
      }
    });

    init();
  </script>
</body>
</html>
